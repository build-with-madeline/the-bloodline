rchemish, governing the former Mitanni lands west of the Euphrates · historical", "house": "HITTITE"}, "HIT_SUPPILU_DAUGHTER": {"label": "daughter of Suppiluliuma I<br/>c.1330 BC · Hittite princess (name unrecorded); married to Shattiwaza of Mitanni to seal the Hittite-Mitanni vassal treaty · historical", "house": "HITTITE"}, "MIT_TUSHRATTAW": {"label": "—", "house": "MITANNI"}, "MIT_SHATTIWAZA": {"label": "👑 Shattiwaza (Kurtiwaza)<br/>c.1330 BC · son of Tushratta (REAL father-son); fled to Suppiluliuma I after the usurper Shuttarna III seized Mitanni; reinstalled as a Hittite puppet king of a shrunken Mitanni/Hanigalbat · historical", "house": "MITANNI"}, "MIT_SHUTTARNA3": {"label": "👑 Shuttarna III<br/>c.1325 BC · rival Mitanni claimant (son of the pretender Artatama II); seized the throne against Tushratta's line &amp; ruled as a pro-Assyrian king, backed by Ashur-uballit I of Assyria &amp; Alshe, until Shattiwaza &amp; the Hittites ousted him · historical", "house": "MITANNI"}, "MIT_SHUTTARNA3W": {"label": "—", "house": "MITANNI"}, "AS_ASHURUBALLIT1W2": {"label": "—", "house": "ASSYRIA"}, "AS_ENLILNIRARI": {"label": "👑 Enlil-nirari<br/>c.1327 BC · son &amp; successor of Ashur-uballit I (REAL father-son); king of the rising Middle Assyrian state that expanded into former Mitanni territory; fought Kurigalzu II of Babylon at Sugagu; his own son was Adad-nirari I (shown elsewhere directly under Ashur-uballit) · historical", "house": "ASSYRIA"}, "BAB_KARAHARDASHW": {"label": "—", "house": "BABYLON"}, "BAB_NAZIBUGASH": {"label": "👑 Nazi-Bugash (Shuzigash)<br/>c.1333 BC · NOT a descendant — a 'son of a nobody' raised to the throne by the Kassite army that revolted against &amp; killed the half-Assyrian Kara-hardash — usurpation · historical", "house": "BABYLON"}, "BAB_NAZIBUGASHW": {"label": "—", "house": "BABYLON"}, "BAB_KURIGALZU2": {"label": "👑 Kurigalzu II<br/>c.1332 BC · NOT the usurper's heir — installed on the Babylonian throne by Ashur-uballit I of Assyria after he crushed Nazi-Bugash (Assyria-Babylon link); said to be a son of Burnaburiash II, restoring the legitimate Kassite line; later turned on Assyria &amp; fought it at Sugagu · historical", "house": "BABYLON"}, "MYC_PELOPS": {"label": "👑 Pelops<br/>c.1350 BC · legendary king of Pisa/Elis; eponym of the Peloponnese; won Hippodamia in the fatal chariot race &amp; founded the accursed House of Pelops · LEGENDARY", "house": "MYCENAE"}, "MYC_HIPPODAMIA": {"label": "Hippodamia<br/>c.1345 BC · daughter of King Oenomaus of Pisa; wife of Pelops; matriarch of the Pelopid line · LEGENDARY", "house": "MYCENAE"}, "MYC_ATREUS": {"label": "👑 Atreus<br/>c.1320 BC · son of Pelops &amp; Hippodamia; king of Mycenae; father of Agamemnon &amp; Menelaus; his blood-feud with Thyestes doomed the house · LEGENDARY", "house": "MYCENAE"}, "MYC_THYESTES": {"label": "👑 Thyestes<br/>c.1318 BC · son of Pelops &amp; Hippodamia; rival &amp; brother of Atreus; the two waged the horror-feud of the House of Pelops · LEGENDARY", "house": "MYCENAE"}, "MYC_EURYDICE": {"label": "Eurydice<br/>c.1355 BC · wife of Electryon of Mycenae; mother of Alcmene · LEGENDARY", "house": "MYCENAE"}, "MYC_ALCMENE": {"label": "Alcmene<br/>c.1340 BC · daughter of Electryon; princess of Mycenae; mother of Heracles by Zeus &amp; of Iphicles by Amphitryon · LEGENDARY", "house": "MYCENAE"}, "MYC_ALCAEUSW": {"label": "—", "house": "MYCENAE"}, "MYC_AMPHITRYON": {"label": "👑 Amphitryon<br/>c.1345 BC · son of Alcaeus, grandson of Perseus; general of Thebes; mortal husband of Alcmene &amp; foster-father of Heracles · LEGENDARY", "house": "MYCENAE"}, "MYC_HERACLES": {"label": "👑 Heracles<br/>c.1300 BC · greatest of the Greek heroes; son of Zeus &amp; Alcmene of Mycenae; his descendants, the Heraclidae, would return to claim the Peloponnese · LEGENDARY", "house": "MYCENAE"}, "EG_SITRE": {"label": "Sitre<br/>c.1300 BC · Great Royal Wife of Ramesses I &amp; mother of Seti I; her name means 'Daughter of Re'; buried in tomb QV38 in the Valley of the Queens · HISTORICAL", "house": "EGYPT"}, "EG_TUYA": {"label": "Tuya (Mut-Tuya)<br/>c.1300 BC · Great Royal Wife of Seti I &amp; mother of Ramesses II; daughter of the lieutenant Raia; honoured with a colossal statue at the Ramesseum · HISTORICAL", "house": "EGYPT"}, "EG_TIA": {"label": "Tia<br/>c.1285 BC · daughter of Seti I &amp; Tuya, sister of Ramesses II; married a royal official also named Tia; the couple built a tomb at Saqqara · HISTORICAL", "house": "EGYPT"}, "EG_NEFERTARI": {"label": "Nefertari (Nefertari Merytmut)<br/>c.1300 BC · favourite Great Royal Wife of Ramesses II; honoured with the smaller temple at Abu Simbel &amp; the finely painted tomb QV66; correspondent of the Hittite queen Puduhepa after the peace treaty · HISTORICAL", "house": "EGYPT"}, "EG_AMUNHERKHEPESHEF": {"label": "Amun-her-khepeshef<br/>c.1278 BC · eldest son of Ramesses II &amp; Nefertari; crown prince and Commander of the Troops; died around Year 25, long before his father, so never reigned · HISTORICAL", "house": "EGYPT"}, "EG_MERYTAMEN": {"label": "Merytamen<br/>c.1272 BC · daughter of Ramesses II &amp; Nefertari; after her mother's death her father raised her to Great Royal Wife — an attested FATHER-DAUGHTER marriage; a colossal 'White Queen' statue at Akhmim depicts her · HISTORICAL", "house": "EGYPT"}, "EG_ISETNOFRET": {"label": "Isetnofret<br/>c.1300 BC · second senior Great Royal Wife of Ramesses II; mother of the pharaoh Merneptah, of Prince Khaemwaset &amp; of Bintanath; prominent especially in the later decades of the reign · HISTORICAL", "house": "EGYPT"}, "EG_KHAEMWASET": {"label": "Khaemwaset<br/>c.1275 BC · fourth son of Ramesses II &amp; Isetnofret; High Priest of Ptah at Memphis who restored ancient monuments &amp; labelled the pyramids — often called the 'first Egyptologist'; managed the Apis-bull Serapeum; died before his father · HISTORICAL", "house": "EGYPT"}, "EG_BINTANATH": {"label": "Bintanath<br/>c.1276 BC · eldest daughter of Ramesses II &amp; Isetnofret; her father later raised her to Great Royal Wife — an attested FATHER-DAUGHTER marriage; buried in tomb QV71 · HISTORICAL", "house": "EGYPT"}, "EG_RAMESSESB": {"label": "Prince Ramesses (Ramesses B)<br/>c.1274 BC · son of Ramesses II &amp; Isetnofret; became crown prince for some 25 years as elder brothers died, but predeceased his long-lived father and so never reigned; the throne passed to his brother Merneptah · HISTORICAL", "house": "EGYPT"}, "EG_ISETNOFRET2": {"label": "Isetnofret II<br/>c.1240 BC · Great Royal Wife of Merneptah &amp; likely mother of Seti II; named for her grandmother, Ramesses II's queen Isetnofret · HISTORICAL", "house": "EGYPT"}, "HIT_MURSILI2_KW": {"label": "—", "house": "HITTITE"}, "HIT_MUWATALLI2": {"label": "👑 Muwatalli II<br/>c.1295 BC · Great King of the Hittites; son of Mursili II (REAL father-son); fought Ramesses II of Egypt to a standstill at the Battle of Kadesh, 1274 BC; moved the capital to Tarhuntassa · historical", "house": "HITTITE"}, "HIT_HATTUSILI3": {"label": "👑 Hattusili III<br/>c.1267 BC · Great King of the Hittites; younger son of Mursili II (REAL father-son); as viceroy he deposed his nephew Urhi-Teshub &amp; usurped the throne; made the world's first known PEACE TREATY, with Ramesses II of Egypt, 1259 BC · historical", "house": "HITTITE"}, "HIT_MUWATALLI2W": {"label": "—", "house": "HITTITE"}, "HIT_URHITESHUB": {"label": "👑 Urhi-Teshub (Mursili III)<br/>c.1272 BC · Great King of the Hittites; son of Muwatalli II (REAL father-son); succeeded his father but was DEPOSED after ~7 years by his uncle Hattusili III &amp; exiled · historical", "house": "HITTITE"}, "HIT_PUDUHEPA": {"label": "👑 Puduhepa<br/>c.1265 BC · Great Queen (Tawananna) of Hatti; daughter of a priest of Kizzuwatna; wife of Hattusili III &amp; one of the most powerful women of the ancient Near East, co-sealing treaties &amp; corresponding with Egypt in her own name · historical", "house": "HITTITE"}, "HIT_MAATHORNEFERURE": {"label": "Maathorneferure<br/>c.1260 BC · Hittite princess, daughter of Hattusili III &amp; Puduhepa (REAL parents); sent to Egypt &amp; married to Ramesses II (~1245 BC) as King's Great Wife, sealing the Egyptian-Hittite peace · historical", "house": "HITTITE"}, "HIT_TUDHALIYA4": {"label": "👑 Tudhaliya IV<br/>c.1237 BC · Great King of the Hittites; son of Hattusili III &amp; Puduhepa (REAL parents); built the Yazilikaya rock sanctuary; lost the Battle of Nihriya to Assyria's Tukulti-Ninurta I · historical", "house": "HITTITE"}, "HIT_TUDHALIYA4W": {"label": "—", "house": "HITTITE"}, "HIT_ARNUWANDA3": {"label": "👑 Arnuwanda III<br/>c.1215 BC · Great King of the Hittites; son of Tudhaliya IV (REAL father-son); reigned only briefly &amp; died without an heir · historical", "house": "HITTITE"}, "HIT_SUPPILULIUMA2": {"label": "👑 Suppiluliuma II<br/>c.1210 BC · the LAST attested Great King of the Hittites; son of Tudhaliya IV (REAL father-son); won the first known naval battle (off Cyprus) but presided over the fall of Hattusa in the Bronze Age collapse, ~1200 BC · historical", "house": "HITTITE"}, "BAB_KURIGALZU2W": {"label": "—", "house": "BABYLON"}, "BAB_NAZIMARUTTASH": {"label": "👑 Nazi-Maruttash<br/>c.1307 BC · King of Kassite Babylon; son of Kurigalzu II (REAL father-son); campaigned against Assyria &amp; Elam; his reign marks the peak of the dynasty · historical", "house": "BABYLON"}, "BAB_NAZIMARUTTASHW": {"label": "—", "house": "BABYLON"}, "BAB_KADASHMANTURGU": {"label": "👑 Kadashman-Turgu<br/>c.1281 BC · King of Kassite Babylon; son of Nazi-Maruttash (REAL father-son); ally of Hattusili III of Hatti against Egypt · historical", "house": "BABYLON"}, "BAB_KADASHMANTURGUW": {"label": "—", "house": "BABYLON"}, "BAB_KADASHMANENLIL2": {"label": "👑 Kadashman-Enlil II<br/>c.1263 BC · King of Kassite Babylon; son of Kadashman-Turgu (REAL father-son); came to the throne young &amp; exchanged the famous diplomatic letters with Hattusili III of Hatti (Babylon-Hittite link) · historical", "house": "BABYLON"}, "BAB_KADASHMANENLIL2W": {"label": "—", "house": "BABYLON"}, "BAB_KUDURENLIL": {"label": "👑 Kudur-Enlil<br/>c.1254 BC · King of Kassite Babylon; son of Kadashman-Enlil II (REAL father-son); a period of temple-building &amp; economic activity · historical", "house": "BABYLON"}, "BAB_KUDURENLILW": {"label": "—", "house": "BABYLON"}, "BAB_SHAGARAKTISHURIASH": {"label": "👑 Shagarakti-Shuriash<br/>c.1245 BC · King of Kassite Babylon; son of Kudur-Enlil (REAL father-son); his name means 'the Sun-god gives life' · historical", "house": "BABYLON"}, "BAB_SHAGARAKTISHURIASHW": {"label": "—", "house": "BABYLON"}, "BAB_KASHTILIASH4": {"label": "👑 Kashtiliash IV<br/>c.1232 BC · King of Kassite Babylon; son of Shagarakti-Shuriash (REAL father-son); DEFEATED &amp; captured by Tukulti-Ninurta I of Assyria ~1225 BC, who sacked Babylon &amp; carried off the statue of Marduk (Assyria-Babylon link by conquest, not marriage) · historical", "house": "BABYLON"}, "MYC_TYNDAREUS": {"label": "👑 Tyndareus<br/>c.1300 BC · king of Sparta; husband of Leda; father of Clytemnestra &amp; Castor, mortal foster-father of Helen &amp; Pollux; his oath of the suitors bound the Greek kings to Menelaus · LEGENDARY", "house": "MYCENAE"}, "MYC_LEDA": {"label": "Leda<br/>c.1298 BC · queen of Sparta; wife of Tyndareus; visited by Zeus in the form of a swan the same night, she bore Helen, Clytemnestra &amp; the Dioscuri · LEGENDARY", "house": "MYCENAE"}, "MYC_CLYTEMNESTRA": {"label": "Clytemnestra<br/>c.1275 BC · daughter of Tyndareus &amp; Leda; queen of Mycenae, wife of Agamemnon; with her lover Aegisthus she murdered Agamemnon on his return from Troy · LEGENDARY", "house": "MYCENAE"}, "MYC_HELEN": {"label": "Helen of Troy<br/>c.1275 BC · daughter of Leda by Zeus (the swan) — 'the face that launched a thousand ships'; wife of Menelaus, carried off by Paris to Troy, the cause of the war · LEGENDARY", "house": "MYCENAE"}, "MYC_CASTOR": {"label": "Castor<br/>c.1276 BC · son of Tyndareus &amp; Leda (the mortal twin); horseman &amp; one of the Dioscuri, twin brother of Pollux · LEGENDARY", "house": "MYCENAE"}, "MYC_POLLUX": {"label": "Pollux (Polydeuces)<br/>c.1276 BC · son of Leda by Zeus (the immortal twin); boxer &amp; one of the Dioscuri; shared his immortality with his mortal twin Castor · LEGENDARY", "house": "MYCENAE"}, "MYC_AEROPE": {"label": "Aerope<br/>c.1315 BC · Cretan princess, granddaughter of Minos; wife of Atreus; mother of Agamemnon &amp; Menelaus · LEGENDARY", "house": "MYCENAE"}, "MYC_AGAMEMNON": {"label": "👑 Agamemnon<br/>c.1290 BC · son of Atreus; over-king of Mycenae/Argos; supreme commander of the Greek host at Troy; sacrificed Iphigenia at Aulis; slain by Clytemnestra &amp; Aegisthus on his return · LEGENDARY", "house": "MYCENAE"}, "MYC_MENELAUS": {"label": "👑 Menelaus<br/>c.1288 BC · son of Atreus; king of Sparta; husband of Helen, whose abduction by Paris launched the war · LEGENDARY", "house": "MYCENAE"}, "MYC_ORESTES": {"label": "👑 Orestes<br/>c.1255 BC · son of Agamemnon &amp; Clytemnestra; avenged his father by killing Clytemnestra &amp; Aegisthus; pursued by the Furies, later king of Mycenae/Argos · LEGENDARY", "house": "MYCENAE"}, "MYC_IPHIGENIA": {"label": "Iphigenia<br/>c.1258 BC · daughter of Agamemnon &amp; Clytemnestra; sacrificed (or spirited away by Artemis) at Aulis to raise the winds for Troy · LEGENDARY", "house": "MYCENAE"}, "MYC_ELECTRA": {"label": "Electra<br/>c.1256 BC · daughter of Agamemnon &amp; Clytemnestra; kept faith with the dead Agamemnon &amp; spurred Orestes to avenge him · LEGENDARY", "house": "MYCENAE"}, "MYC_CHRYSOTHEMIS": {"label": "Chrysothemis<br/>c.1257 BC · daughter of Agamemnon &amp; Clytemnestra; the compliant sister who, unlike Electra, submitted to the usurpers · LEGENDARY", "house": "MYCENAE"}, "MYC_HERMIONE": {"label": "Hermione<br/>c.1258 BC · daughter of Menelaus &amp; Helen of Sparta; later wife of Orestes (and, in some tellings, of Neoptolemus) · LEGENDARY", "house": "MYCENAE"}, "MYC_PELOPIA": {"label": "Pelopia<br/>c.1300 BC · daughter of Thyestes; by her own father she bore Aegisthus — the incest that continued the curse of the House of Pelops · LEGENDARY", "house": "MYCENAE"}, "MYC_AEGISTHUS": {"label": "👑 Aegisthus<br/>c.1285 BC · son of Thyestes (by his daughter Pelopia); seized Clytemnestra &amp; the throne of Mycenae — the usurper; with her murdered Agamemnon, and was later slain by Orestes · LEGENDARY", "house": "MYCENAE"}, "TRO_ELECTRA": {"label": "Electra<br/>c.1400 BC · the Pleiad, daughter of Atlas; by Zeus she bore Dardanus, founder of the Trojan royal line · LEGENDARY", "house": "TROY"}, "TRO_DARDANUS": {"label": "👑 Dardanus<br/>c.1380 BC · son of Zeus &amp; Electra; founder of Dardania on the Troad &amp; the ancestor of the Trojan kings; eponym of the Dardanelles · LEGENDARY", "house": "TROY"}, "TRO_BATEA": {"label": "Batea<br/>c.1378 BC · daughter of Teucer, first king of the Troad; wife of Dardanus; mother of Erichthonius · LEGENDARY", "house": "TROY"}, "TRO_ERICHTHONIUS": {"label": "👑 Erichthonius<br/>c.1360 BC · son of Dardanus; king of Dardania, said to be the wealthiest of men, lord of three thousand mares; father of Tros · LEGENDARY", "house": "TROY"}, "TRO_ASTYOCHE": {"label": "Astyoche<br/>c.1358 BC · daughter of the river-god Simoeis; wife of Erichthonius; mother of Tros · LEGENDARY", "house": "TROY"}, "TRO_TROS": {"label": "👑 Tros<br/>c.1340 BC · son of Erichthonius; king who gave his name to Troy (Troia) &amp; the Trojans; father of Ilus, Assaracus &amp; Ganymede · LEGENDARY", "house": "TROY"}, "TRO_CALLIRRHOE": {"label": "Callirrhoe<br/>c.1338 BC · daughter of the river-god Scamander; wife of Tros; mother of Ilus, Assaracus &amp; Ganymede · LEGENDARY", "house": "TROY"}, "TRO_ILUS": {"label": "👑 Ilus<br/>c.1320 BC · son of Tros; founder of Ilion/Ilium (the city of Troy proper); father of Laomedon; the senior royal line · LEGENDARY", "house": "TROY"}, "TRO_ASSARACUS": {"label": "👑 Assaracus<br/>c.1318 BC · son of Tros; king of Dardania &amp; head of the junior Dardanian branch that runs Capys > Anchises > Aeneas · LEGENDARY", "house": "TROY"}, "TRO_GANYMEDE": {"label": "Ganymede<br/>c.1316 BC · son of Tros; the most beautiful of mortals, seized by Zeus (as an eagle) to be cup-bearer of the gods on Olympus · LEGENDARY", "house": "TROY"}, "TRO_EURYDICE": {"label": "Eurydice<br/>c.1318 BC · daughter of Adrastus; wife of Ilus of Troy; mother of Laomedon (distinct from the Perseid Eurydice of Mycenae) · LEGENDARY", "house": "TROY"}, "TRO_LAOMEDON": {"label": "👑 Laomedon<br/>c.1300 BC · son of Ilus; king of Troy who built its great walls with Apollo &amp; Poseidon then cheated them &amp; Heracles; father of Priam &amp; Hesione · LEGENDARY", "house": "TROY"}, "TRO_STRYMO": {"label": "Strymo<br/>c.1298 BC · daughter of the river-god Scamander; wife of Laomedon; mother of Priam &amp; Hesione · LEGENDARY", "house": "TROY"}, "TRO_PRIAM": {"label": "👑 Priam<br/>c.1280 BC · son of Laomedon; the last king of Troy; father of Hector, Paris &amp; some fifty children; slain by Neoptolemus at the city's fall · LEGENDARY", "house": "TROY"}, "TRO_HESIONE": {"label": "Hesione<br/>c.1278 BC · daughter of Laomedon; rescued from a sea-monster by Heracles then given to Telamon of Salamis; mother of Teucer the archer · LEGENDARY", "house": "TROY"}, "TRO_HECUBA": {"label": "Hecuba<br/>c.1278 BC · chief queen of Troy, wife of Priam; mother of Hector, Paris, Cassandra &amp; many more; her grief became the archetype of the fall of Troy · LEGENDARY", "house": "TROY"}, "TRO_HECTOR": {"label": "👑 Hector<br/>c.1250 BC · eldest son of Priam &amp; Hecuba; heir of Troy &amp; its greatest warrior; killed Patroclus, was slain by Achilles &amp; dragged round the walls · LEGENDARY", "house": "TROY"}, "TRO_PARIS": {"label": "Paris (Alexandros)<br/>c.1248 BC · son of Priam &amp; Hecuba; his abduction of Helen began the war; awarded the golden apple, he slew Achilles with an arrow · LEGENDARY", "house": "TROY"}, "TRO_CASSANDRA": {"label": "Cassandra<br/>c.1246 BC · daughter of Priam &amp; Hecuba; prophetess cursed by Apollo to foresee truly yet never be believed; taken as spoil by Agamemnon · LEGENDARY", "house": "TROY"}, "TRO_DEIPHOBUS": {"label": "Deiphobus<br/>c.1252 BC · son of Priam &amp; Hecuba; a leading Trojan warrior who married Helen after Paris's death; killed at the sack of Troy · LEGENDARY", "house": "TROY"}, "TRO_HELENUS": {"label": "Helenus<br/>c.1246 BC · son of Priam &amp; Hecuba; seer &amp; twin of Cassandra; survived the war &amp; later ruled in Epirus, wedding Andromache · LEGENDARY", "house": "TROY"}, "TRO_POLYXENA": {"label": "Polyxena<br/>c.1244 BC · daughter of Priam &amp; Hecuba; sacrificed on the tomb of Achilles after the fall of Troy · LEGENDARY", "house": "TROY"}, "TRO_TROILUS": {"label": "Troilus<br/>c.1242 BC · young son of Priam &amp; Hecuba; his death at Achilles' hands was fated to seal Troy's doom; hero of the later Troilus &amp; Cressida legend · LEGENDARY", "house": "TROY"}, "TRO_ANDROMACHE": {"label": "Andromache<br/>c.1250 BC · wife of Hector; princess of Cilician Thebe; after Troy fell she was taken by Neoptolemus, later wed Helenus · LEGENDARY", "house": "TROY"}, "TRO_ASTYANAX": {"label": "Astyanax (Scamandrius)<br/>c.1225 BC · infant son of Hector &amp; Andromache; hurled from the walls of Troy by the Greeks so no heir of Hector would survive · LEGENDARY", "house": "TROY"}, "TRO_HIEROMNEME": {"label": "Hieromneme<br/>c.1316 BC · daughter of the river-god Simoeis; wife of Assaracus; mother of Capys · LEGENDARY", "house": "TROY"}, "TRO_CAPYS": {"label": "👑 Capys<br/>c.1300 BC · son of Assaracus; king of Dardania; father of Anchises · LEGENDARY", "house": "TROY"}, "TRO_THEMISTE": {"label": "Themiste<br/>c.1298 BC · daughter of Ilus &amp; sister of Laomedon; wife of Capys; mother of Anchises · LEGENDARY", "house": "TROY"}, "TRO_ANCHISES": {"label": "👑 Anchises<br/>c.1280 BC · son of Capys; Dardanian prince &amp; herdsman of Mount Ida; loved by Aphrodite, to whom he fathered Aeneas; borne from burning Troy on his son's shoulders · LEGENDARY", "house": "TROY"}, "CRE_APHRODITE": {"label": "Aphrodite<br/>c.1300 BC · goddess of love &amp; beauty; loved the Dardanian prince Anchises &amp; bore him Aeneas, as told in the Homeric Hymn to Aphrodite · LEGENDARY", "house": "CRETE"}, "TRO_AENEAS": {"label": "👑 Aeneas<br/>c.1250 BC · son of Anchises &amp; the goddess Aphrodite; Dardanian hero who fled burning Troy carrying his father; the LEGENDARY ancestor of the Romans — his son Ascanius/Iulus founded Alba Longa &amp; the Julii claimed his line · LEGENDARY", "house": "TROY"}, "EG_SETI2WB": {"label": "—", "house": "EGYPT"}, "EG_SIPTAH": {"label": "👑 Siptah<br/>c.1197 BC · 19th Dynasty · son of Seti II; a boy-king whose mummy reveals a deformed clubfoot; real power lay with the Syrian chancellor Bay, 'the power behind the throne', whom Siptah later had executed · historical", "house": "EGYPT"}, "EG_SIPTAHW": {"label": "—", "house": "EGYPT"}, "EG_TWOSRET": {"label": "👑 Twosret (Tausret)<br/>c.1191 BC · 19th Dynasty · Great Royal Wife of Seti II who ruled as regent for Siptah and then as FEMALE PHARAOH in her own right, closing the 19th Dynasty; buried in the large tomb KV14 · historical", "house": "EGYPT"}, "EG_ISET_TAHEMDJERT": {"label": "Iset Ta-Hemdjert<br/>c.1190 BC · 20th Dynasty · Great Royal Wife of Ramesses III &amp; mother of the pharaohs Ramesses IV and Ramesses VI; buried in tomb QV51 in the Valley of the Queens · historical", "house": "EGYPT"}, "EG_RAMESSES4": {"label": "👑 Ramesses IV<br/>c.1155 BC · 20th Dynasty · son of Ramesses III &amp; Iset Ta-Hemdjert; mounted huge quarrying expeditions to Wadi Hammamat but reigned only about six years as royal power waned · historical", "house": "EGYPT"}, "EG_TIYE_R3": {"label": "Tiye<br/>c.1190 BC · 20th Dynasty · a secondary wife of Ramesses III who masterminded the HAREM CONSPIRACY, a palace plot that assassinated the king (his mummy shows a slit throat) to put her son Pentawer on the throne · historical", "house": "EGYPT"}, "EG_PENTAWER": {"label": "Pentawer<br/>c.1160 BC · 20th Dynasty · son of Ramesses III &amp; Tiye and figurehead of the Harem Conspiracy; convicted at the trials in the Judicial Papyrus of Turin and forced to take his own life; likely the mummified 'Screaming Man' (Unknown Man E) · historical", "house": "EGYPT"}, "EG_RAMESSES4W": {"label": "—", "house": "EGYPT"}, "EG_RAMESSES5": {"label": "👑 Ramesses V<br/>c.1149 BC · 20th Dynasty · son of Ramesses IV; a short reign marred by temple corruption and land disputes (the Wilbour Papyrus); his mummy bears lesions once read as smallpox; succeeded by his uncle · historical", "house": "EGYPT"}, "EG_RAMESSES5W": {"label": "—", "house": "EGYPT"}, "EG_RAMESSES6": {"label": "👑 Ramesses VI<br/>c.1145 BC · 20th Dynasty · a son of Ramesses III and brother of Ramesses IV, so the UNCLE of his own predecessor Ramesses V; usurped and enlarged tomb KV9; the last king to hold Egypt's Sinai mines firmly · historical", "house": "EGYPT"}, "EG_RAMESSES6W": {"label": "—", "house": "EGYPT"}, "EG_RAMESSES7": {"label": "👑 Ramesses VII<br/>c.1136 BC · 20th Dynasty · son of Ramesses VI; his reign saw record-high grain prices amid a deepening economic crisis · historical", "house": "EGYPT"}, "EG_RAMESSES7W": {"label": "—", "house": "EGYPT"}, "EG_RAMESSES8": {"label": "👑 Ramesses VIII (Sethherkhepeshef)<br/>c.1130 BC · 20th Dynasty · the LAST surviving son of Ramesses III to take the throne, an uncle passing over the direct line; a fleeting reign of about a year, and the only 20th-Dynasty king whose tomb has never been located · historical", "house": "EGYPT"}, "EG_RAMESSES8W": {"label": "—", "house": "EGYPT"}, "EG_RAMESSES9": {"label": "👑 Ramesses IX<br/>c.1126 BC · 20th Dynasty · probably a grandson of Ramesses III; his reign is documented by the TOMB-ROBBERY PAPYRI (Abbott and Amherst), records of the trials of gangs plundering the royal tombs at Thebes · historical", "house": "EGYPT"}, "EG_RAMESSES9W": {"label": "—", "house": "EGYPT"}, "EG_RAMESSES10": {"label": "👑 Ramesses X<br/>c.1111 BC · 20th Dynasty · a poorly attested king; work on the royal tombs repeatedly halted as Libyan raids and unrest disrupted the Theban necropolis · historical", "house": "EGYPT"}, "EG_RAMESSES10W": {"label": "—", "house": "EGYPT"}, "EG_RAMESSES11": {"label": "👑 Ramesses XI<br/>c.1107 BC · 20th Dynasty · the LAST pharaoh of the New Kingdom; by his death real power had passed to the High Priests of Amun at Thebes (Herihor) and to Smendes in the north, fragmenting Egypt and ENDING the New Kingdom · historical", "house": "EGYPT"}, "EL_SHUTRUKGAPW": {"label": "—", "house": "ELAM"}, "EL_SHUTRUKNAHHUNTE": {"label": "👑 Shutruk-Nahhunte I<br/>c.1184 BC · King of Elam at its imperial height; NOT a descendant of the Kidinuids — a ~290-yr gap across the omitted Igihalkid dynasty separates them (succession-by-convention, flagged); sacked Babylon 1158 BC &amp; killed the Kassite Zababa-shuma-iddina; carried the Code of Hammurabi law-stele &amp; the Naram-Sin victory-stele off to Susa · historical", "house": "ELAM"}, "EL_SHUTRUKNAHHUNTEW": {"label": "—", "house": "ELAM"}, "EL_KUTIRNAHHUNTE2": {"label": "👑 Kutir-Nahhunte II<br/>c.1155 BC · King of Elam; son of Shutruk-Nahhunte I (REAL father-son); completed the conquest of Babylonia &amp; ENDED the Kassite dynasty by deposing its last king Enlil-nadin-ahi · historical", "house": "ELAM"}, "EL_SHILHAKINSHUSHINAK": {"label": "👑 Shilhak-Inshushinak<br/>c.1150 BC · King of Elam; son of Shutruk-Nahhunte I &amp; successor to his elder brother Kutir-Nahhunte II (REAL father-son); the greatest builder of the Elamite kingdom &amp; its last great king · historical", "house": "ELAM"}, "EL_SHILHAKINSHUSHINAKW": {"label": "—", "house": "ELAM"}, "EL_HUTELUTUSHINSHUSHINAK": {"label": "👑 Hutelutush-Inshushinak<br/>c.1120 BC · King of Elam; son of Shilhak-Inshushinak per most sources (some make him a son of Kutir-Nahhunte II — parentage disputed, flagged) mp; then of SOLOMON of Israel, supplying Lebanon cedar, cypress &amp; artisans for Solomon's Temple in exchange for wheat, oil &amp; wine — a royal ALLIANCE, not a marriage · historical", "house": "PHOENICIA"}, "AS_TP1_21W": {"label": "—", "house": "ASSYRIA"}, "AS_ASHARIDAPALEKUR": {"label": "👑 Asharid-apal-Ekur<br/>c.1076 BC · Middle Assyria · son of Tiglath-Pileser I; reigned only about two years before his brother Ashur-bel-kala took the throne · historical", "house": "ASSYRIA"}, "AS_ASHARIDAPALEKURW": {"label": "—", "house": "ASSYRIA"}, "AS_ASHURBELKALA": {"label": "👑 Ashur-bel-kala<br/>c.1074 BC · Middle Assyria · BROTHER of Asharid-apal-Ekur (both sons of Tiglath-Pileser I), whom he succeeded — succession, NOT descent · reigned ~18 yr; by his death Aramean tribes pressed hard on the western borders &amp; Assyria lost much of its dominated territory · historical", "house": "ASSYRIA"}, "AS_ASHURBELKALAW": {"label": "—", "house": "ASSYRIA"}, "AS_ERIBAADAD2": {"label": "👑 Eriba-Adad II<br/>c.1056 BC · Middle Assyria · son of Ashur-bel-kala; reigned only about two years before being deposed by his usurping uncle Shamshi-Adad IV, amid the Aramean squeeze on a shrinking Assyria · historical", "house": "ASSYRIA"}, "BAB_SIMBARSHIPAKW": {"label": "—", "house": "BABYLON"}, "BAB_SIMBARSHIPAK": {"label": "👑 Simbar-Shipak<br/>c.1025 BC · founder of the SECOND SEALAND DYNASTY (Babylon's 5th) — NOT descent, an unrelated soldier from the south who took the throne in the turmoil of Aramean incursions · historical", "house": "BABYLON"}, "BAB_EULMASHSHAKINSHUMIW": {"label": "—", "house": "BABYLON"}, "BAB_EULMASHSHAKINSHUMI": {"label": "👑 Eulmash-shakin-shumi<br/>c.1000 BC · founder of the BAZI (Bit-Bazi) Dynasty (Babylon's 6th) from a Kassite tribal clan — NOT descent from Simbar-Shipak; his reign was consumed by wars against Aramaeans who raided close to Babylon's walls · historical", "house": "BABYLON"}, "EG_SIAMUNW2": {"label": "—", "house": "EGYPT"}, "EG_PHARAOHDAU": {"label" · 2 Kings 11, 2 Chron 22-24", "house": null}, "JEHOSHEBA": {"label": "Jehosheba (Jehoshabeath)<br/>c.865 BC · daughter of King Joram of Judah &amp; sister of Ahaziah; wife of the priest Jehoiada; rescued the infant Joash from Athaliah · 2 Kings 11:2, 2 Chron 22:11", "house": null}, "ELIJAH": {"label": "Elijah the Tishbite<br/>c.870 BC · prophet of Gilead; opposed Ahab &amp; Jezebel and the worship of Baal; taken up in a whirlwind · 1 Kings 17 - 2 Kings 2", "house": null}, "ELIJAHW": {"label": "—", "house": null}, "SHAPHAT": {"label": "Shaphat<br/>c.900 BC · of Abel-meholah; father of the prophet Elisha · 1 Kings 19:16", "house": null}, "SHAPHATW": {"label": "—", "house": null}, "ELISHA": {"label": "Elisha<br/>c.870 BC · prophet, son of Shaphat; successor to Elijah with a double portion of his spirit · 1 Kings 19 - 2 Kings 13", "house": null}, "MOABW": {"label": "—", "house": "SCRIPTURE"}, "KEMOSHYAT": {"label": "King Kemosh-yat of Moab<br/>c.880 BC · father of King Mesha per the Mesha Stele; a distant descendant of Moab (ethnic bridge, not a literal son; ~1000+ yrs elided) · Mesha Stele (bridge)", "house": "SCRIPTURE"}, "KEMOSHYATW": {"label": "—", "house": "SCRIPTURE"}, "MESHA": {"label": "👑 Mesha<br/>c.840 BC · King of Moab of the Moabite Stone (Mesha Stele); rebelled against Israel after Ahab's death · 2 Kings 3, Mesha Stele", "house": "SCRIPTURE"}, "ARM_REZON": {"label": "👑 Rezon (Hezion)<br/>c.940 BC · founder of the independent kingdom of Aram-Damascus · son of Eliada; a fugitive from Hadadezer of Zobah who seized Damascus &amp; threw off the yoke of Solomon's Israel, becoming its lifelong adversary (1 Kings 11:23-25) · often equated with the Hezion whose house the later kings descend from · historical", "house": "ARAM"}, "ARM_REZONW": {"label": "—", "house": "ARAM"}, "ARM_HEZION": {"label": "👑 Hezion<br/>c.920 BC · King of Aram-Damascus · grandfather of Ben-Hadad I in the pedigree of 1 Kings 15:18 (Ben-Hadad son of Tabrimmon son of Hezion); founder-figure of , until Jehoahaz's son Jehoash recovered the lost towns in three victories over him (2 Kings 13:25) · named 'Mari' in the Zakkur Stele &amp; Hadianu in the Assyrian record · historical", "house": "ARAM"}, "AS_SHAMSHIADAD5MOTHERW": {"label": "—", "house": "ASSYRIA"}, "AS_SHAMSHIADAD5": {"label": "👑 Shamshi-Adad V<br/>c.824 BC · Neo-Assyria · son of Shalmaneser III · his reign opened with a bitter CIVIL WAR against his brother Ashur-danin-pal, who had led much of Assyria in revolt against their aged father; he prevailed with Babylonian help, then campaigned against Babylon &amp; the Zagros · historical", "house": "ASSYRIA"}, "AS_SAMMURAMAT": {"label": "👑 Sammu-ramat (Semiramis)<br/>c.820 BC · queen of Shamshi-Adad V &amp; mother of Adad-nirari III (already in the tree; not re-drawn here) · she wielded rare power for an Assyrian queen, serving as REGENT during her son's minority &amp; even named on a royal boundary stele beside him · the historical kernel of the later Greek legend of the warrior-queen SEMIRAMIS · historical", "house": "ASSYRIA"}, "EG_SHOSHENQ3W": {"label": "—", "house": "EGYPT"}, "EG_PAMI": {"label": "👑 Pami (Pimay)<br/>c.773 BC · 22nd Dynasty · son of Shoshenq III · a short reign of about six years over a Delta kingdom already shrinking as rival Libyan chiefs asserted themselves · historical", "house": "EGYPT"}, "EG_PAMIW": {"label": "—", "house": "EGYPT"}, "EG_SHOSHENQ5": {"label": "👑 Shoshenq V<br/>c.767 BC · 22nd Dynasty · son of Pami · reigned about 38 years, one of the longest of the dynasty, but ruled only a rump Tanite realm as the Delta splintered among local princes (Tefnakht of Sais, Iuput II of Leontopolis, Nimlot of Hermopolis) · historical", "house": "EGYPT"}, "EG_SHOSHENQ3W2": {"label": "—", "house": "EGYPT"}, "EG_PEDUBAST1": {"label": "👑 Pedubast I<br/>c.826 BC · founder of the rival 23rd Dynasty at Leontopolis / Thebes · declared himself king in Year 8 of Shoshenq III, running a parallel Upper-Egyptian line alongside the Tanite 22nd Dynasty — the formal fracture of the Third Intermediate Period · his descent is DEBATED (possibly son of Harsiese A, not of Shoshenq III); edge shows the break, not certain paternity · historical (filiation flagged)", "house": "EGYPT"}, "ROM_LATINUS": {"label": "👑 Latinus<br/>c.1200 BC · king of the Latins in Latium; son of Faunus in the tradition; gave his daughter Lavinia to Aeneas, sealing the Trojan-Latin union · LEGENDARY", "house": "ROME"}, "ROM_AMATA": {"label": "Amata<br/>c.1198 BC · queen of the Latins, wife of Latinus; opposed the match &amp; favored Turnus for Lavinia; died by her own hand as Troy's cause prevailed · LEGENDARY", "house": "ROME"}, "ROM_LAVINIA": {"label": "Lavinia<br/>c.1195 BC · daughter of Latinus &amp; Amata; wife of Aeneas; the town of Lavinium was named for her; mother of the Alban line · LEGENDARY", "house": "ROME"}, "ROM_ASCANIUS": {"label": "👑 Ascanius (Iulus)<br/>c.1180 BC · son of Aeneas; founder &amp; first king of Alba Longa c.30 yrs after Lavinium; ancestor claimed by the gens Julia (hence Julius Caesar) — VARIANT: often called son of Aeneas's Trojan wife Creusa, not Lavinia · LEGENDARY", "house": "ROME"}, "ROM_SILVIUS_M": {"label": "—", "house": "ROME"}, "ROM_SILVIUS": {"label": "👑 Silvius<br/>c.1148 BC · king of Alba Longa; born in the forest (silva), eponym of the Silvii, the dynastic name of the Alban kings · LEGENDARY", "house": "ROME"}, "ROM_AENEASSILVIUS_M": {"label": "—", "house": "ROME"}, "ROM_AENEASSILVIUS": {"label": "👑 Aeneas Silvius<br/>c.1116 BC · king of Alba Longa; second of the Silvian line · LEGENDARY", "house": "ROME"}, "ROM_LATINUSSILVIUS_M": {"label": "—", "house": "ROME"}, "ROM_LATINUSSILVIUS": {"label": "👑 Latinus Silvius<br/>c.1084 BC · king of Alba Longa; said to have founded Latin colonies (the 'Prisci Latini') · LEGENDARY", "house": "ROME"}, "ROM_ALBA_M": {"label": "—", "house": "ROME"}, "ROM_ALBA": {"label": "👑 Alba<br/>c.1052 BC · king of Alba Longa; the city's eponym in the tradition · LEGENDARY", "house": "ROME"}, "ROM_ATYS_M": {"label": "—", "house": "ROME"}, "ROM_ATYS": {"label": "👑 Atys<br/>c.1020 BC · king of Alba Longa (rendered Epytus/Capetus in some versions of the list) · LEGENDARY", "house": "ROME"}, "ROM_CAPYS_M": {"label": "—", "house": "ROME"}, "ROM_CAPYS_ALB": {"label": "👑 Capys<br/>c.988 BC · king of Alba Longa (distinct from the Trojan Capys of the Dardanian line) · LEGENDARY", "house": "ROME"}, "ROM_CAPETUS_M": {"label": "—", "house": "ROME"}, "ROM_CAPETUS": {"label": "👑 Capetus<br/>c.956 BC · king of Alba Longa · LEGENDARY", "house": "ROME"}, "ROM_TIBERINUS_M": {"label": "—", "house": "ROME"}, "ROM_TIBERINUS": {"label": "👑 Tiberinus (Silvius)<br/>c.924 BC · king of Alba Longa; drowned in the river Albula, which was thereafter named the Tiber (Tiberis) &amp; he a river-god · LEGENDARY", "house": "ROME"}, "ROM_AGRIPPA_M": {"label": "—", "house": "ROME"}, "ROM_AGRIPPA": {"label": "👑 Agrippa<br/>c.892 BC · king of Alba Longa · LEGENDARY", "house": "ROME"}, "ROM_ROMULUSSILVIUS_M": {"label": "—", "house": "ROME"}, "ROM_ROMULUSSILVIUS": {"label": "👑 Romulus Silvius<br/>c.860 BC · king of Alba Longa (Remulus/Allodius in variants); tradition says he mimicked Jupiter's thunder &amp; was killed by a thunderbolt · LEGENDARY", "house": "ROME"}, "ROM_AVENTINUS_M": {"label": "—", "house": "ROME"}, "ROM_AVENTINUS": {"label": "👑 Aventinus<br/>c.828 BC · king of Alba Longa; buried on the hill that took his name, the Aventine of Rome · LEGENDARY", "house": "ROME"}, "ROM_PROCAS_M": {"label": "—", "house": "ROME"}, "ROM_PROCAS": {"label": "👑 Procas<br/>c.796 BC · king of Alba Longa; father of Numitor &amp; Amulius; willed the throne to the elder Numitor · LEGENDARY", "house": "ROME"}, "ROM_PROCAS_W": {"label": "—", "house": "ROME"}, "ROM_NUMITOR": {"label": "👑 Numitor<br/>c.790 BC · rightful king of Alba Longa, elder son of Procas; deposed by his brother Amulius; grandfather of Romulus &amp; Remus, later restored by them · LEGENDARY", "house": "ROME"}, "ROM_AMULIUS": {"label": "👑 Amulius<br/>c.788 BC · younger son of Procas; usurped the throne of Alba Longa from Numitor, murdered Numitor's sons &amp; forced Rhea Silvia into the Vestals; slain when Romulus &amp; Remus restored their grandfather · LEGENDARY", "house": "ROME"}, "ROM_NUMITOR_W": {"label": "—", "house": "ROME"}, "ROM_RHEASILVIA": {"label": "Rhea Silvia (Ilia)<br/>c.772 BC · daughter of Numitor; made a Vestal Virgin by Amulius to end her father's line; bore Romulus &amp; Remus to the god Mars &amp; was imprisoned · LEGENDARY", "house": "ROME"}, "CRE_MARS": {"label": "Mars<br/>c.800 BC · Roman god of war; father of Romulus &amp; Remus by Rhea Silvia, making him the divine ancestor of the Roman people · LEGENDARY", "house": "CRETE"}, "ROM_ROMULUS": {"label": "👑 Romulus<br/>753 BC · son of Rhea Silvia &amp; Mars; with his twin Remus suckled by the she-wolf; founder &amp; first king of Rome (traditionally 21 April 753 BC); slew Remus over the walls; deified as Quirinus · LEGENDARY", "house": "ROME"}, "ROM_REMUS": {"label": "Remus<br/>753 BC · twin of Romulus; leapt in scorn over the new walls of Rome &amp; was killed by his brother, so that one founder should rule · LEGENDARY", "house": "ROME"}, "ROM_NUMA_SUCCW": {"label": "—", "house": "ROME"}, "ROM_NUMA": {"label": "👑 Numa Pompilius<br/>715 BC · 2nd king of Rome (acc. 715 BC), a Sabine of Cures, son of Pomponius; ELECTED, not kin to Romulus; founded the priesthoods, the calendar &amp; Roman religion · LEGENDARY", "house": "ROME"}, "ROM_TULLUS_SUCCW": {"label": "—", "house": "ROME"}, "ROM_TULLUS": {"label": "👑 Tullus Hostilius<br/>673 BC · 3rd king of Rome (acc. 673 BC); grandson of Hostus Hostilius; a warrior-king who razed Alba Longa &amp; brought the Alban families to Rome · LEGENDARY", "house": "ROME"}, "ROM_ANCUS_SUCCW": {"label": "—", "house": "ROME"}, "ROM_ANCUS": {"label": "👑 Ancus Marcius<br/>642 BC · 4th king of Rome (acc. 642 BC); grandson of Numa via his daughter Pompilia; built the first Tiber bridge &amp; the port of Ostia; ancestor claimed by the gens Marcia · LEGENDARY", "house": "ROME"}, "ROM_PRISCUS_SUCCW": {"label": "—", "house": "ROME"}, "ROM_PRISCUS": {"label": "👑 Lucius Tarquinius Priscus<br/>616 BC · 5th king of Rome (acc. 616 BC); son of the Corinthian Demaratus, came from Etruscan Tarquinii with his wife Tanaquil; the first Etruscan king; head of the Tarquin house · LEGENDARY", "house": "ROME"}, "ROM_SERVIUS_SUCCW": {"label": "—", "house": "ROME"}, "ROM_SERVIUS": {"label": "👑 Servius Tullius<br/>578 BC · 6th king of Rome (acc. 578 BC); reputedly son of the captive Ocrisia, raised in Priscus's house &amp; wed to his daughter; reformed the census &amp; the centuriate army; murdered by Tarquinius Superbus &amp; his own daughter Tullia · LEGENDARY", "house": "ROME"}, "ROM_SUPERBUS_SUCCW": {"label": "—", "house": "ROME"}, "ROM_SUPERBUS": {"label": "👑 Lucius Tarquinius Superbus<br/>534 BC · 7th &amp; last king of Rome (acc. 534 BC); son/grandson of Priscus; married Tullia, daughter of Servius, &amp; helped murder him; his tyranny &amp; the rape of Lucretia by his son led to his expulsion in 509 BC — the birth of the Roman Republic · LEGENDARY", "house": "ROME"}, "MYC_CEISUS_W": {"label": "—", "house": "MYCENAE"}, "MYC_CEISUS": {"label": "👑 Ceisus<br/>c.1085 BC · son of Temenus; king of Argos in the Temenid line · LEGENDARY", "house": "MYCENAE"}, "MYC_MARON_W": {"label": "—", "house": "MYCENAE"}, "MYC_MARON": {"label": "👑 Maron<br/>c.1030 BC · Temenid king of Argos; ancestor of the Macedonian Argeads in the received pedigree · LEGENDARY", "house": "MYCENAE"}, "MYC_THESTRUS_W": {"label": "—", "house": "MYCENAE"}, "MYC_THESTRUS": {"label": "👑 Thestrus<br/>c.975 BC · Temenid of the Argive royal line; ancestor of Caranus · LEGENDARY", "house": "MYCENAE"}, "MYC_ACOUS_W": {"label": "—", "house": "MYCENAE"}, "MYC_ACOUS": {"label": "👑 Acous<br/>c.920 BC · Temenid of the Argive royal line; ancestor of Caranus · LEGENDARY", "house": "MYCENAE"}, "MYC_ARISTODAMIDAS_W": {"label": "—", "house": "MYCENAE"}, "MYC_ARISTODAMIDAS": {"label": "👑 Aristodamidas<br/>c.865 BC · Temenid king of Argos; father of Caranus in the received Argead pedigree · LEGENDARY", "house": "MYCENAE"}, "MAC_CARANUS_W": {"label": "—", "house": "ANTIQUITY"}, "MAC_CARANUS": {"label": "👑 Caranus<br/>c.808 BC · Heraclid of Argos who went north &amp; founded the Argead dynasty at Aegae; the legendary first king of Macedon · LEGENDARY", "house": "ANTIQUITY"}, "MAC_COENUS_W": {"label": "—", "house": "ANTIQUITY"}, "MAC_COENUS": {"label": "👑 Coenus<br/>c.775 BC · son of Caranus; king of Macedon in the Argead line · LEGENDARY", "house": "ANTIQUITY"}, "MAC_TYRIMMAS_W": {"label": "—", "house": "ANTIQUITY"}, "MAC_TYRIMMAS": {"label": "👑 Tyrimmas<br/>c.740 BC · son of Coenus; father of Perdiccas I; an intermediary king inserted to lengthen the Argead pedigree · semi-legendary", "house": "ANTIQUITY"}, "MAC_TYRIMMAS_W2": {"label": "—", "house": "ANTIQUITY"}, "MYC_AGIS1_W": {"label": "—", "house": "MYCENAE"}, "MYC_AGIS1": {"label": "👑 Agis I<br/>c.1050 BC · son of Eurysthenes; eponym of the Agiad royal house of Sparta · semi-legendary", "house": "MYCENAE"}, "MYC_ECHESTRATUS_W": {"label": "—", "house": "MYCENAE"}, "MYC_ECHESTRATUS": {"label": "👑 Echestratus<br/>c.1010 BC · son of Agis I; Agiad king of Sparta · semi-legendary", "house": "MYCENAE"}, "MYC_LABOTAS_W": {"label": "—", "house": "MYCENAE"}, "MYC_LABOTAS": {"label": "👑 Labotas<br/>c.965 BC · son of Echestratus; Agiad king; in Herodotus the child-king guarded by his uncle Lycurgus · semi-legendary", "house": "MYCENAE"}, "MYC_DORYSSUS_W": {"label": "—", "house": "MYCENAE"}, "MYC_DORYSSUS": {"label": "👑 Doryssus<br/>c.920 BC · son of Labotas; Agiad king of Sparta · semi-legendary", "house": "MYCENAE"}, "MYC_AGESILAUS1_W": {"label": "—", "house": "MYCENAE"}, "MYC_AGESILAUS1": {"label": "👑 Agesilaus I<br/>c.875 BC · son of Doryssus; Agiad king of Sparta · semi-legendary", "house": "MYCENAE"}, "MYC_ARCHELAUS_SP_W": {"label": "—", "house": "MYCENAE"}, "MYC_ARCHELAUS_SP": {"label": "👑 Archelaus<br/>c.825 BC · son of Agesilaus I; Agiad king who with the Eurypontid Charilaus took Aegys · semi-legendary", "house": "MYCENAE"}, "MYC_TELECLUS_W": {"label": "—", "house": "MYCENAE"}, "MYC_TELECLUS": {"label": "👑 Teleclus<br/>c.760 BC · son of Archelaus; Agiad king who took Amyclae, Pharis &amp; Geronthrae; slain by Messenians · semi-legendary", "house": "MYCENAE"}, "MYC_SOOS_W": {"label": "—", "house": "MYCENAE"}, "MYC_SOOS": {"label": "👑 Soos<br/>c.1050 BC · reputed son of Procles; Eurypontid king; a later insertion, likely fictitious · LEGENDARY", "house": "MYCENAE"}, "MYC_EURYPON_W": {"label": "—", "house": "MYCENAE"}, "MYC_EURYPON": {"label": "👑 Eurypon<br/>c.1010 BC · son of Soos; eponym of the Eurypontid royal house of Sparta · semi-legendary", "house": "MYCENAE"}, "MYC_PRYTANIS_W": {"label": "—", "house": "MYCENAE"}, "MYC_PRYTANIS": {"label": "👑 Prytanis<br/>c.960 BC · son of Eurypon; Eurypontid king of Sparta · semi-legendary", "house": "MYCENAE"}, "MYC_POLYDECTES_SP_W": {"label": "—", "house": "MYCENAE"}, "MYC_POLYDECTES_SP": {"label": "👑 Polydectes<br/>c.905 BC · son of Prytanis; Eurypontid king of Sparta · semi-legendary", "house": "MYCENAE"}, "MYC_EUNOMUS_W": {"label": "—", "house": "MYCENAE"}, "MYC_EUNOMUS": {"label": "👑 Eunomus<br/>c.850 BC · son of Polydectes; Eurypontid king; father of Charilaus &amp; (in tradition) of Lycurgus · semi-legendary", "house": "MYCENAE"}, "MYC_EUNOMUS_W2": {"label": "—", "house": "MYCENAE"}, "MYC_CHARILAUS": {"label": "👑 Charilaus<br/>c.790 BC · son of Eunomus; Eurypontid king who raided Argos &amp; Tegea; nephew &amp; ward of Lycurgus · semi-legendary", "house": "MYCENAE"}, "MYC_LYCURGUS": {"label": "Lycurgus<br/>c.800 BC · younger Eurypontid son (traditionally of Eunomus); the lawgiver who framed Sparta's constitution &amp; served as royal regent — parentage &amp; the king he guarded disputed · semi-legendary", "house": "MYCENAE"}, "JERUSHA": {"label": "Jerusha (Jerushah)<br/>c.795 BC · daughter of Zadok; wife of King Uzziah of Judah &amp; mother of King Jotham (2 Kings 15:33, already in the tree) · her husband Uzziah reigned long &amp; ably but was struck with leprosy for usurping the priests' office to burn incense in the Temple (2 Chron 26:16-21), living the rest of his life in isolation while Jotham governed the land · historical (biblical)", "house": "SCRIPTURE"}, "ABIJAHJUDAH": {"label": "Abijah (Abi)<br/>c.760 BC · daughter of Zechariah; wife of King Ahaz of Judah &amp; mother of the reformer King Hezekiah (2 Kings 18:2; 2 Chron 29:1, already in the tree) · her husband Ahaz, pressed by the Syro-Ephraimite war, stripped the Temple &amp; palace to buy the aid of Assyria, submitting to Tiglath-Pileser III with the words 'I am your servant &amp; your son' (2 Kings 16:7-9) · historical (biblical)", "house": "SCRIPTURE"}, "HEPHZIBAH": {"label": "Hephzibah<br/>c.725 BC · wife of King Hezekiah of Judah &amp; mother of King Manasseh (2 Kings 21:1, already on the spine) · her husband Hezekiah was Judah's great reformer — he cleansed the Temple &amp; smashed the high places (2 Kings 18:4); recovered from a mortal illness with fifteen years added to his life (2 Kings 20:1-11); and withstood the Assyrian king Sennacherib's siege of Jerusalem in 701 BC, when the army encamped against the city withdrew (2 Kings 18-19) · historical (biblical)", "house": "SCRIPTURE"}, "AMOZ": {"label": "Amoz<br/>c.785 BC · father of the prophet Isaiah (Isaiah 1:1); by later tradition a brother of King Amaziah of Judah, though scripture says only 'Amoz' · historical (biblical)", "house": null}, "AMOZW": {"label": "—", "house": null}, "ISAIAH": {"label": "Isaiah<br/>c.760 BC · son of Amoz; the great prophet of Judah, active from the death of Uzziah through the reigns of Jotham, Ahaz &amp; Hezekiah (Isaiah 1:1) · counseled Hezekiah through Sennacherib's 701 BC siege &amp; his illness (Isaiah 36-39); spoke of the child Immanuel born of a virgin (Isaiah 7:14) &amp; of the suffering servant (Isaiah 53) · historical (biblical)", "house": null}, "MICAH": {"label": "Micah<br/>c.750 BC · prophet of Moresheth in the Judean lowlands, a contemporary of Isaiah, prophesying under Jotham, Ahaz &amp; Hezekiah (Micah 1:1) · foretold the fall of both Samaria &amp; Jerusalem and named Bethlehem as the birthplace of the coming ruler (Micah 5:2) · historical (biblical)", "house": null}, "MICAHW": {"label": "—", "house": null}, "AMOS": {"label": "Amos<br/>c.765 BC · a herdsman &amp; dresser of sycamore-figs from Tekoa in Judah, sent north to prophesy against the prosperous but unjust kingdom of Israel under Jeroboam II (Amos 1:1; 7:14-15) · foretold Israel's overthrow &amp; exile 'beyond Damascus' (Amos 5:27), fulfilled by Assyria a generation later · historical (biblical)", "house": null}, "AMOSW": {"label": "—", "house": null}, "HOSEA": {"label": "Hosea<br/>c.755 BC · son of Beeri; the last prophet of the northern kingdom, whose marriage to Gomer became a living parable of Israel's unfaithfulness (Hosea 1) · he foretold the fall of Samaria — which the Assyrians Shalmaneser V &amp; Sargon II besieged &amp; took in 722 BC, deporting the ten northern tribes into exile as the 'lost tribes' in the last days of King Hoshea (2 Kings 17) · historical (biblical)", "house": null}, "HOSEAW": {"label": "—", "house": null}, "AS_NAQIA": {"label": "👑 Naqia (Zakutu)<br/>c.728 BC · a consort of Sennacherib (secondary wife, married while he was still crown prince) &amp; mother of Esarhaddon (already in the tree; not re-drawn here) · a woman of extraordinary power for Assyria: as queen-mother she helped secure Esarhaddon's contested accession, then bound the empire's magnates by the Zakutu Treaty to accept her grandson Ashurbanipal, ruling in her own name at the height of her influence · historical", "house": "ASSYRIA"}, "EG_ALARA": {"label": "👑 Alara<br/>c.780 BC · king of Kush at Napata, the earliest named ruler of the kingdom &amp; founder-figure of the Napatan royal house later venerated by the 25th-Dynasty pharaohs · he ruled only Nubia, not Egypt, so he was not himself a pharaoh · historical (dates debated)", "house": "EGYPT"}, "EG_ALARAW": {"label": "—", "house": "EGYPT"}, "EG_KASHTA": {"label": "👑 Kashta<br/>c.760 BC · king of Kush at Napata, successor &amp; probable brother of Alara · pushed Kushite power north to Elephantine &amp; Thebes and had his daughter Amenirdis I consecrated as God's Wife of Amun, setting the stage for the conquest of Egypt · father (per the standard reconstruction, not directly attested) of Piye &amp; Shabaka, the first two Kushite pharaohs of Egypt (both already in the tree; named here in-label only, NOT re-parented) · historical (kinship &amp; dates debated)", "house": "EGYPT"}, "EG_PIYEW2": {"label": "—", "house": "EGYPT"}, "EG_SHEBITKU": {"label": "👑 Shebitku (Shabataka)<br/>c.702 BC · 25th (Kushite / Nubian) Dynasty · son of Piye, reigning between his uncle Shabaka &amp; his brother Taharqa (both already in the tree) · his reign saw the first great clash with a resurgent Assyria as Kushite Egypt backed the Levantine states against Sennacherib · historical (order &amp; dates of Shabaka/Shebitku debated)", "house": "EGYPT"}, "ROM_JULII_GAPW": {"label": "—", "house": "ROME"}, "ROM_JULII_GAP": {"label": "the gens Julia<br/>the Julii claimed descent from Iulus (Ascanius) through Venus &amp; Aeneas; the ~600-year line to the historical family is Roman tradition, not documented · LEGENDARY bridge", "house": "ROME"}, "JUL_CAESARGFW": {"label": "—", "house": "ANTIQUITY"}, "JUL_CAESARGF": {"label": "Gaius Julius Caesar<br/>c.140 BC · grandfather of the dictator; the historical gens Julia · historical", "house": "ANTIQUITY"}, "JUL_MARCIA": {"label": "Marcia<br/>c.128 BC · wife of the elder Caesar", "house": "ANTIQUITY"}, "JUL_CAESARF": {"label": "Gaius Julius Caesar<br/>c.130 BC · father of the dictator; praetor · historical", "house": "ANTIQUITY"}, "JUL_AURELIA": {"label": "Aurelia Cotta<br/>c.120 BC · mother of Julius Caesar · historical", "house": "ANTIQUITY"}, "JULIUSCAESAR": {"label": "👑 Gaius Julius Caesar<br/>100-44 BC · dictator of Rome; crossed the Rubicon; assassinated on the Ides of March · historical", "house": "SCOTLAND"}, "JUL_JULIAMINOR": {"label": "Julia Minor<br/>c.101 BC · Caesar's sister; grandmother of Augustus · historical", "house": "ANTIQUITY"}, "JUL_ATIUSBALBUS": {"label": "Marcus Atius Balbus<br/>c.105 BC · praetor · historical", "house": "ANTIQUITY"}, "JUL_CORNELIA": {"label": "Cornelia<br/>c.94 BC · Caesar's first wife, daughter of Cinna · historical", "house": "ANTIQUITY"}, "JUL_JULIACAESARIS": {"label": "Julia<br/>c.76 BC · Caesar's daughter; wife of Pompey the Great · historical", "house": "ANTIQUITY"}, "JUL_CAESARION": {"label": "👑 Caesarion (Ptolemy XV)<br/>47-30 BC · son of Caesar &amp; Cleopatra VII; last Ptolemaic king, killed by Octavian · historical", "house": "ANTIQUITY"}, "MESHULLEMETH": {"label": "Meshullemeth<br/>c.700 BC · daughter of Haruz of Jotbah; wife of King Manasseh of Judah &amp; mother of King Amon (2 Kings 21:19, already on the spine) · her husband Manasseh reigned 55 years, the longest of any king of Judah, filling Jerusalem with idolatry &amp; innocent blood (2 Kings 21:16) before, by Chronicles' account, repenting in Assyrian captivity (2 Chron 33:11-13) · historical (biblical)", "house": "SCRIPTURE"}, "JEDIDAH": {"label": "Jedidah<br/>c.650 BC · daughter of Adaiah of Bozkath; wife of King Amon of Judah &amp; mother of the reformer King Josiah (2 Kings 22:1, already on the spine) · her husband Amon walked in his father Manasseh's idolatry &amp; was assassinated by his own servants in the palace after only two years, avenged by the people of the land (2 Kings 21:19-24) · historical (biblical)", "house": "SCRIPTURE"}, "HAMUTAL": {"label": "Hamutal<br/>c.632 BC · daughter of Jeremiah of Libnah; wife of King Josiah of Judah &amp; mother of TWO kings — Jehoahaz/Shallum (2 Kings 23:31) &amp; Zedekiah the last king (2 Kings 24:18), both already in the tree · her husband Josiah, Judah's last great reformer, found the Book of the Law &amp; purged idolatry (2 Kings 22-23) but was slain by Pharaoh Necho II at Megiddo in 609 BC (2 Kings 23:29) · her son Zedekiah was blinded &amp; carried to Babylon when Nebuchadnezzar II burned Jerusalem &amp; the Temple in 587/586 BC, beginning the Exile (2 Kings 25) · historical (biblical)", "house": "SCRIPTURE"}, "ZEBIDAH": {"label": "Zebidah (Zebudah)<br/>c.630 BC · daughter of Pedaiah of Rumah; a wife of King Josiah of Judah &amp; mother of King Jehoiakim/Eliakim (2 Kings 23:36, already in the tree) · her son Jehoiakim was installed by Pharaoh Necho II in place of his brother Jehoahaz, became Nebuchadnezzar's vassal &amp; then rebelled (2 Kings 24:1) · his son Jehoiachin/Jeconiah — Josiah's GRANDSON, whom the existing tree simplifies as Josiah's own son — was carried to Babylon in 597 BC (2 Kings 24:6-15) · historical (biblical)", "house": "SCRIPTURE"}, "HILKIAHANATHOTH": {"label": "Hilkiah<br/>c.675 BC · one of the priests at Anathoth in Benjamin &amp; father of the prophet Jeremiah (Jer 1:1) · distinct from the high priest Hilkiah who found the Book of the Law in Josiah's reign (2 Kings 22:8) · historical (biblical)", "house": null}, "HILKIAHANATHOTHW": {"label": "—", "house": null}, "JEREMIAH": {"label": "Jeremiah<br/>c.645 BC · son of Hilkiah of Anathoth; the 'weeping prophet', called in Josiah's 13th year (627 BC) &amp; prophesying through the reigns of Josiah's sons to the fall of Jerusalem (Jer 1:1-3) · he foretold the seventy-year Babylonian captivity, was imprisoned &amp; lowered into a cistern for his warnings (Jer 38), witnessed the 587 destruction &amp; lamented it (Lamentations), and was carried off to Egypt by fleeing survivors (Jer 43) · historical (biblical)", "house": null}, "BUZI": {"label": "Buzi<br/>c.650 BC · a priest of Judah &amp; father of the prophet Ezekiel (Ezek 1:3) · historical (biblical)", "house": null}, "BUZIW": {"label": "—", "house": null}, "EZEKIEL": {"label": "Ezekiel<br/>c.622 BC · son of Buzi the priest; prophet of the Exile, carried to Babylon with King Jehoiachin in 597 BC &amp; called by the vision of the wheels &amp; the living creatures by the river Chebar in the land of the Chaldeans (Ezek 1:1-3) · he prophesied the fall of Jerusalem, then the vision of the valley of dry bones &amp; the restored Temple to the exiles (Ezek 37) · historical (biblical)", "house": null}, "DANIEL": {"label": "Daniel<br/>c.620 BC · of the royal &amp; noble youths of Judah carried to Babylon in the first deportation (605 BC) &amp; trained for the king's service, renamed Belteshazzar (Dan 1:3-7) · he interpreted Nebuchadnezzar's dreams, survived the lions' den under Darius, &amp; received the apocalyptic visions of the four kingdoms (Dan 2, 6, 7) · historical (biblical)", "house": null}, "DANIELW": {"label": "—", "house": null}, "EG_TAHARQAW": {"label": "—", "house": "EGYPT"}, "EG_PSAMTIK1": {"label": "👑 Psamtik I (Psammetichus I)<br/>c.664 BC · 26th (Saite) Dynasty, ruling from Sais; son of Necho I · installed as an Assyrian vassal, he threw off Assyrian overlordship &amp; reunified all Egypt under one native throne c.656 BC, ending the Third Intermediate Period · his power rested on Ionian &amp; Carian Greek mercenaries, opening Egypt to the Greek world · historical", "house": "EGYPT"}, "EG_PSAMTIK1W": {"label": "—", "house": "EGYPT"}, "EG_NECHO2": {"label": "👑 Necho II (Nekau II)<br/>c.610 BC · 26th (Saite) Dynasty; son of Psamtik I · marching north to prop up the collapsing Assyrian empire, he KILLED King Josiah of Judah at Megiddo in 609 BC (2 Kings 23:29), deposed Jehoahaz to Egypt &amp; set up Jehoiakim as his puppet · then crushed by Nebuchadnezzar II of Babylon at Carchemish in 605 BC, losing Syria-Palestine · he began a Nile-Red Sea canal &amp; is said to have sent a Phoenician fleet round Africa · historical", "house": "EGYPT"}, "EG_NECHO2W": {"label": "—", "house": "EGYPT"}, "EG_PSAMTIK2": {"label": "👑 Psamtik II (Psammetichus II)<br/>c.595 BC · 26th (Saite) Dynasty; son of Necho II · led a great campaign south into Nubia/Kush against the Napatan kingdom, and a state visit into Syria-Palestine that may have stirred Judah's hopes of resisting Babylon · historical", "house": "EGYPT"}, "EG_PSAMTIK2W": {"label": "—", "house": "EGYPT"}, "EG_APRIES": {"label": "👑 Apries (Wahibre; the Pharaoh Hophra)<br/>c.589 BC · 26th (Saite) Dynasty; son of Psamtik II · the 'Hophra king of Egypt' whom Jeremiah foretold would be given into his enemies' hand (Jer 44:30) · he intervened in the Levant during Judah's last agony but could not save Jerusalem from Nebuchadnezzar (587 BC); a failed Libyan campaign sparked an army revolt that raised up his general Amasis · historical", "house": "EGYPT"}, "EG_APRIESW": {"label": "—", "house": "EGYPT"}, "EG_AMASIS2": {"label": "👑 Amasis II (Ahmose II)<br/>c.570 BC · 26th (Saite) Dynasty · a general of common birth who overthrew Apries in a civil war (NOT his son) &amp; seized the throne · his long, prosperous reign was the dynasty's golden age — allied with the Greeks, he gave the trading colony of Naukratis to them &amp; made Egypt rich, remembered by Herodotus as a shrewd &amp; genial king · historical (usurper, not of the royal blood)", "house": "EGYPT"}, "EG_AMASIS2W": {"label": "—", "house": "EGYPT"}, "EG_PSAMTIK3": {"label": "👑 Psamtik III (Psammetichus III)<br/>c.526 BC · 26th (Saite) Dynasty; son of Amasis II &amp; last pharaoh of independent Egypt · reigning barely six months, he was defeated by Cambyses II of Persia at the battle of Pelusium in 525 BC &amp; later executed, making Egypt a Persian province (the 27th Dynasty) &amp; ending native Egyptian rule · historical", "house": "EGYPT"}, "MED_DEIOCES": {"label": "👑 Deioces<br/>c.700 BC · semi-legendary founder &amp; first king of the Medes who (per Herodotus) united the Median tribes &amp; built the capital Ecbatana · historical (semi-legendary)", "house": "MEDIA"}, "MED_DEIOCESW": {"label": "—", "house": "MEDIA"}, "MED_PHRAORTES": {"label": "👑 Phraortes<br/>c.665 BC · son of Deioces; king of Media who subdued the Persians &amp; opened the wars against Assyria, dying in battle against it (per Herodotus) · historical (semi-legendary)", "house": "MEDIA"}, "MED_PHRAORTESW": {"label": "—", "house": "MEDIA"}, "MED_CYAXARES": {"label": "👑 Cyaxares<br/>c.625 BC · son of Phraortes; the great warrior-king of Media who allied with Nabopolassar of Babylon to destroy Nineveh &amp; the Assyrian empire (612 BC), ending the successors of Ashurbanipal -- Ashur-etil-ilani, Sinsharishkun &amp; the last king Ashur-uballit II (all already in the tree, not re-drawn) · historical", "house": "MEDIA"}, "MED_CYAXARESW": {"label": "—", "house": "MEDIA"}, "MED_ASTYAGES": {"label": "👑 Astyages<br/>c.585 BC · son of Cyaxares; the last king of Media, deposed c.550 BC by his own grandson Cyrus the Great, whose victory merged Media into the rising Persian empire · historical", "house": "MEDIA"}, "MED_AMYTIS": {"label": "Amytis of Media<br/>c.605 BC · daughter of Cyaxares of Media &amp; queen of Babylon as wife of Nebuchadnezzar II; her marriage sealed the Medo-Babylonian alliance, &amp; for her Nebuchadnezzar is said to have built the Hanging Gardens of Babylon to recall her green Median homeland · historical (Gardens tradition)", "house": "MEDIA"}, "LYD_GYGES": {"label": "👑 Gyges<br/>c.680 BC · founder of the Mermnad dynasty of Lydia who seized the throne of Sardis by killing King Candaules -- the deed tied in legend to the ring of Gyges that made its wearer invisible (Plato, Republic II) · historical", "house": "LYDIA"}, "LYD_GYGESW": {"label": "—", "house": "LYDIA"}, "LYD_ARDYS": {"label": "👑 Ardys<br/>c.645 BC · son of Gyges; king of Lydia who fought the invading Cimmerians &amp; the Ionian Greek cities of the coast · historical", "house": "LYDIA"}, "LYD_ARDYSW": {"label": "—", "house": "LYDIA"}, "LYD_SADYATTES":
